spring.application.name=gamificada
server.port=8080

# ── Banco de dados (MySQL) ────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/gamificada_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────
# IMPORTANTE: troque esta chave por uma string aleatória longa em produção
jwt.secret=minha-chave-super-secreta-trocar-em-producao-32chars
jwt.expiration=86400000
